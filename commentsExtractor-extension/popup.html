<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>commentsExtractor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg:      #0a0c0f;
      --bg2:     #111418;
      --bg3:     #1a1f26;
      --border:  #1e2530;
      --green:   #00ff88;
      --blue:    #00ccff;
      --red:     #ff6b6b;
      --yellow:  #ffe66d;
      --teal:    #4ecdc4;
      --muted:   #4a5568;
      --text:    #c8d6e5;
      --text2:   #8899aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 520px;
      min-height: 180px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .header {
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--blue); }
    .badge {
      margin-left: auto;
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .input-row {
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    #urlInput {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    #urlInput:focus { border-color: var(--green); }

    .btn {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--green); color: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-blue { border-color: var(--blue); color: var(--blue); }
    .btn-blue:hover { background: var(--blue); color: var(--bg); }

    #statusBar {
      padding: 5px 14px;
      font-size: 10px;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      min-height: 24px;
      align-items: center;
    }
    .stat-value.html  { color: var(--red); font-weight: 700; }
    .stat-value.css   { color: var(--teal); font-weight: 700; }
    .stat-value.js    { color: var(--yellow); font-weight: 700; }
    .stat-value.total { color: var(--green); font-weight: 700; }

    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 7px 16px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .tab:hover { color: var(--text); }
    .tab.active.html-tab  { color: var(--red);    border-bottom-color: var(--red); }
    .tab.active.css-tab   { color: var(--teal);   border-bottom-color: var(--teal); }
    .tab.active.js-tab    { color: var(--yellow);  border-bottom-color: var(--yellow); }
    .tab .count {
      margin-left: 4px;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      background: var(--bg3);
    }

    #resultsPanel {
      max-height: 340px;
      overflow-y: auto;
      padding: 8px;
    }
    #resultsPanel::-webkit-scrollbar { width: 4px; }
    #resultsPanel::-webkit-scrollbar-track { background: var(--bg); }
    #resultsPanel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: var(--muted);
      font-size: 11px;
      line-height: 2;
    }

    .file-group {
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .file-header {
      padding: 6px 10px;
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .file-header:hover { background: #1e2530; }
    .file-name {
      font-size: 10px;
      color: var(--text2);
      word-break: break-all;
    }
    .file-type-label { font-weight: 700; margin-right: 4px; }
    .file-type-label.html { color: var(--red); }
    .file-type-label.css  { color: var(--teal); }
    .file-type-label.js   { color: var(--yellow); }
    .file-count {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg);
      white-space: nowrap;
    }
    .file-count.html { color: var(--red); }
    .file-count.css  { color: var(--teal); }
    .file-count.js   { color: var(--yellow); }
    .chevron { font-size: 8px; color: var(--muted); margin-left: 6px; transition: transform 0.15s; }
    .collapsed .chevron { transform: rotate(-90deg); }

    .comments-list { padding: 4px 8px 6px; }
    .comment-item {
      padding: 5px 8px;
      margin: 3px 0;
      background: var(--bg);
      border-left: 2px solid var(--border);
      border-radius: 0 3px 3px 0;
      font-size: 10px;
      color: var(--text2);
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .comment-item:hover { color: var(--text); border-left-color: var(--green); }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--red);
      padding: 12px;
      font-size: 10px;
      border: 1px solid #ff6b6b33;
      border-radius: 4px;
      margin: 8px;
    }

    .toolbar {
      padding: 7px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">comments<span>Extractor</span></span>
    <span class="badge">MV3</span>
  </div>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="https://target.com" spellcheck="false" />
    <button class="btn" id="scanBtn">SCAN</button>
    <button class="btn btn-blue" id="activeTabBtn">ACTIVE TAB</button>
  </div>

  <div id="statusBar">
    <span>ready</span>
  </div>

  <div class="tabs" id="tabs" style="display:none">
    <div class="tab html-tab active" data-type="html">HTML <span class="count" id="htmlCount">0</span></div>
    <div class="tab css-tab"         data-type="css" >CSS  <span class="count" id="cssCount">0</span></div>
    <div class="tab js-tab"          data-type="js"  >JS   <span class="count" id="jsCount">0</span></div>
  </div>

  <div id="resultsPanel">
    <div class="empty-state">enter a URL or click ACTIVE TAB</div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <button class="btn btn-blue" id="exportJson">JSON</button>
    <button class="btn btn-blue" id="exportTxt">TXT</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
